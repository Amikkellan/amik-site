    <script>
        // 立即初始化主题和语言，避免页面闪烁
        (function() {
            // 检测localStorage可用性
            function isLocalStorageAvailable() {
                try {
                    const test = 'test';
                    localStorage.setItem(test, test);
                    localStorage.removeItem(test);
                    return true;
                } catch (e) {
                    return false;
                }
            }

            // 安全地获取localStorage值
            function getLocalStorage(key, defaultValue) {
                if (isLocalStorageAvailable()) {
                    return localStorage.getItem(key) || defaultValue;
                }
                return defaultValue;
            }

            // 应用主题设置
            function applyTheme() {
                const savedTheme = getLocalStorage('theme', 'light');
                let isDark = false;
                
                if (savedTheme === 'light') {
                    document.documentElement.dataset.theme = 'light';
                } else if (savedTheme === 'dark') {
                    document.documentElement.dataset.theme = 'dark';
                    isDark = true;
                } else if (savedTheme === 'system') {
                    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    document.documentElement.dataset.theme = prefersDark ? 'dark' : 'light';
                    isDark = prefersDark;
                }
                
                // 设置主题图标状态
                document.documentElement.style.setProperty('--theme-icon', isDark ? 'dark' : 'light');
            }

            // 应用语言设置
            function applyLanguage() {
                const savedLanguage = getLocalStorage('language', 'zh-CN');
                // 这里只设置语言，具体的语言更新由initPage()处理
            }

            // 应用字体大小设置
            function applyFontSize() {
                const savedFontSize = getLocalStorage('fontSize', '16');
                document.documentElement.style.fontSize = savedFontSize + 'px';
            }

            // 应用底边栏状态设置
            function applyFooterState() {
                // 检查底部栏默认展开设置和当前状态
                const footerDefault = getLocalStorage('footerDefault', 'true') === 'true';
                const savedFooterVisible = getLocalStorage('footerVisible', footerDefault ? 'true' : 'false') === 'true';
                
                // 这里只设置CSS变量，具体的DOM操作由initFooterState()处理
                // 这样可以在页面渲染前设置好基础样式
                document.documentElement.style.setProperty('--footer-visible', savedFooterVisible ? 'true' : 'false');
            }

            // 立即应用主题、语言、字体大小和底边栏状态
            applyTheme();
            applyLanguage();
            applyFontSize();
            applyFooterState();
        })();
    </script>
    <link rel="stylesheet" href="../css/style.css">

</head>

<script>
    // 页面加载完成后显示内容区域
    window.addEventListener('DOMContentLoaded', () => {
        const content = document.querySelector('.content');
        if (content) {
            content.style.opacity = '1';
            content.style.transform = 'translateY(0)';
        }
        
        const contentSections = document.querySelectorAll('.content-section');
        contentSections.forEach((section) => {
            section.style.opacity = '1';
            section.style.transform = 'translateY(0)';
        });
        
        const settingItems = document.querySelectorAll('.setting-item');
        settingItems.forEach((item) => {
            item.style.opacity = '1';
            item.style.transform = 'translateY(0)';
        });
    });
</script>

<script>

    function scrollToSection(sectionId) {
        const section = document.getElementById(sectionId);

            smoothScrollTo(section.offsetTop - 100);
        }
    }

    // 语言切换功能
    let currentLanguage = getLocalStorage('language', 'zh-CN');



    // 更新语言

        if (!lang) {
            lang = currentLanguage;
        } else {
            // 更新全局变量
            currentLanguage = lang;
        }
        
        const elements = {
            'zh-CN': {

                'notes': '笔记',

                'language': 'Language',

                'languageToggle': 'Toggle language',
                'logo': 'Click to return to home page'
            }
        };

        // 更新页面标题
        document.title = elements[lang]['settings'] + ' - Amik.cc.cd';

        // 使用通用函数更新导航按钮
        updateNavButtons(lang, elements);

        // 更新其他提示文本
        document.getElementById('logo').title = elements[lang]['logo'];
        document.getElementById('footerToggle').title = elements[lang]['footerToggle'];
        document.getElementById('themeToggle').title = elements[lang]['themeToggle'];
        document.getElementById('languageToggle').title = elements[lang]['languageToggle'];

        // 更新内容
        document.querySelector('.content h1').textContent = elements[lang]['settings'];
        document.querySelectorAll('.content-section h2')[0].textContent = elements[lang]['theme'];
        document.querySelectorAll('.setting-label-text')[0].textContent = elements[lang]['light'];

        document.querySelectorAll('.setting-label-text')[2].textContent = elements[lang]['system'];
        document.querySelectorAll('.content-section h2')[1].textContent = elements[lang]['display'];
        document.querySelectorAll('.setting-item label')[3].textContent = elements[lang]['fontSize'];
        document.querySelectorAll('.content-section h2')[2].textContent = elements[lang]['language'];

        document.querySelectorAll('.setting-label-text')[4].textContent = elements[lang]['english'];
        document.querySelectorAll('.content-section h2')[3].textContent = elements[lang]['other'];

        document.getElementById('clearCache').textContent = elements[lang]['clearCache'];
        
        // 更新导航指示器位置和宽度
        setTimeout(() => {
            if (typeof updateNavIndicator === 'function') {
                updateNavIndicator();
            }
        }, 100);
    }

    // 显示通知
    function showNotification(message, type = 'success') {
        const notification = document.createElement('div');
        notification.className = `notification ${type} visible`;
        notification.innerHTML = `
            <span>${message}</span>
            <button class="close-btn" onclick="this.parentElement.remove()">&times;</button>
        `;
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.classList.remove('visible');
            setTimeout(() => {
                notification.remove();
            }, 300);
        }, 3000);
    }

    // 显示确认通知
    function showConfirmNotification(message, onConfirm) {
        const notification = document.createElement('div');
        notification.className = 'confirm-modal';
        
        // 根据当前语言设置按钮文本
        const cancelText = currentLanguage === 'zh-CN' ? '取消' : 'Cancel';
        const confirmText = currentLanguage === 'zh-CN' ? '确认' : 'Confirm';
        
        notification.innerHTML = `
            <div class="confirm-content">
                <div class="confirm-message">${message}</div>
                <div class="confirm-buttons">
                    <button class="confirm-btn cancel">${cancelText}</button>
                    <button class="confirm-btn confirm">${confirmText}</button>
                </div>
            </div>
        `;
        document.body.appendChild(notification);
        
        // 触发动画
        setTimeout(() => {
            notification.classList.add('visible');
        }, 10);
        
        const confirmBtn = notification.querySelector('.confirm-btn.confirm');
        const cancelBtn = notification.querySelector('.confirm-btn.cancel');
        
        confirmBtn.addEventListener('click', () => {
            notification.classList.remove('visible');
            setTimeout(() => {
                onConfirm();
                notification.remove();
            }, 300);
        });
        
        cancelBtn.addEventListener('click', () => {
            notification.classList.remove('visible');
            setTimeout(() => {
                notification.remove();
            }, 300);
        });
    }

    // 主题设置

            const themeToggle = document.getElementById('themeToggle');

            } else if (theme === 'dark') {
                document.body.dataset.theme = 'dark';
                document.documentElement.dataset.theme = 'dark';
                if (themeToggle) themeToggle.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="theme-icon"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 16c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7zm1-11h-2v3H8v2h3v3h2v-3h3v-2h-3V8z"/></svg>';
            } else if (theme === 'system') {
                // 跟随系统主题
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.body.dataset.theme = prefersDark ? 'dark' : 'light';
                document.documentElement.dataset.theme = prefersDark ? 'dark' : 'light';
                if (themeToggle) {
                    if (prefersDark) {
                        themeToggle.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="theme-icon"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 16c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7zm1-11h-2v3H8v2h3v3h2v-3h3v-2h-3V8z"/></svg>';
                    } else {
                        themeToggle.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="theme-icon"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>';
                    }
                }
            }
            // 保存设置到本地存储
            setLocalStorage('theme', theme);
        });
    });

    // 字体大小设置
    function initFontSizeSlider() {
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const fontSizeValue = document.getElementById('fontSizeValue');
        
        if (fontSizeSlider && fontSizeValue) {
            // 确保初始值正确显示
            const initialFontSize = getLocalStorage('fontSize', '16');
            fontSizeSlider.value = initialFontSize;
            fontSizeValue.textContent = initialFontSize + 'px';
            document.documentElement.style.fontSize = initialFontSize + 'px';
            
            // 绑定input事件监听器，确保实时更新
            fontSizeSlider.addEventListener('input', () => {
                const fontSize = fontSizeSlider.value;
                document.documentElement.style.fontSize = fontSize + 'px';
                fontSizeValue.textContent = fontSize + 'px';
                // 保存设置到本地存储
                setLocalStorage('fontSize', fontSize);
                // 更新导航指示器位置和宽度
                if (typeof updateNavIndicator === 'function') {
                    updateNavIndicator();
                }
            });
            
            // 绑定change事件监听器，确保最终值也能更新
            fontSizeSlider.addEventListener('change', () => {
                const fontSize = fontSizeSlider.value;
                document.documentElement.style.fontSize = fontSize + 'px';
                fontSizeValue.textContent = fontSize + 'px';
                // 保存设置到本地存储
                setLocalStorage('fontSize', fontSize);
                // 更新导航指示器位置和宽度
                if (typeof updateNavIndicator === 'function') {
                    updateNavIndicator();
                }
            });
        }
    }



    // 语言设置
    const languageRadios = document.querySelectorAll('input[name="language"]');
    languageRadios.forEach(radio => {
        radio.addEventListener('change', () => {
            const language = radio.value;
            currentLanguage = language;
            setLocalStorage('language', currentLanguage);
            updateLanguage();
        });
    });

    // 为所有设置项添加更改监听器，立即应用设置
    const allSettingsInputs = document.querySelectorAll('input[type="checkbox"], input[type="radio"], input[type="range"]');
    allSettingsInputs.forEach(input => {
        input.addEventListener('change', applySettings);
    });

    // 应用设置函数
    function applySettings() {
        // 应用主题设置
        const themeRadio = document.querySelector('input[name="theme"]:checked');
        if (themeRadio) {
            const selectedTheme = themeRadio.value;
            const themeToggle = document.getElementById('themeToggle');
            if (selectedTheme === 'light') {
                document.documentElement.dataset.theme = 'light';
                if (themeToggle) themeToggle.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="theme-icon"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>';
            } else if (selectedTheme === 'dark') {
                document.documentElement.dataset.theme = 'dark';
                if (themeToggle) themeToggle.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="theme-icon"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 16c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7zm1-11h-2v3H8v2h3v3h2v-3h3v-2h-3V8z"/></svg>';
            } else if (selectedTheme === 'system') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.dataset.theme = prefersDark ? 'dark' : 'light';
                if (themeToggle) {
                    if (prefersDark) {
                        themeToggle.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="theme-icon"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 16c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7zm1-11h-2v3H8v2h3v3h2v-3h3v-2h-3V8z"/></svg>';
                    } else {
                        themeToggle.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="theme-icon"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>';
                    }
                }
            }
            setLocalStorage('theme', selectedTheme);
        }
        
        // 应用字体大小设置
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        if (fontSizeSlider) {
            const fontSize = fontSizeSlider.value;
            document.documentElement.style.fontSize = fontSize + 'px';
            const fontSizeValue = document.getElementById('fontSizeValue');
            if (fontSizeValue) {
                fontSizeValue.textContent = fontSize + 'px';
            }
            setLocalStorage('fontSize', fontSize);
        }
    }

    // 清除缓存
    document.getElementById('clearCache').addEventListener('click', () => {
        const confirmMessage = currentLanguage === 'zh-CN' ? '确定要清除所有缓存吗？' : 'Are you sure you want to clear all cache?';
        const successMessage = currentLanguage === 'zh-CN' ? '缓存已清除，刷新页面生效' : 'Cache cleared, refresh page to take effect';
        const errorMessage = currentLanguage === 'zh-CN' ? '清除缓存失败' : 'Failed to clear cache';
        
        showConfirmNotification(confirmMessage, () => {
            try {
                localStorage.clear();
                showNotification(successMessage);
            } catch (e) {
                showNotification(errorMessage, 'error');
                console.error('Error clearing cache:', e);
            }
        });
    });



    // 初始化函数
    function init() {
        // 初始化字体大小
        initFontSizeSlider();
        
        // 初始化主题
        const savedTheme = getLocalStorage('theme', 'light');
        const themeRadio = document.querySelector(`input[name="theme"][value="${savedTheme}"]`);
        if (themeRadio) {
            themeRadio.checked = true;
            // 触发change事件以应用主题
            const event = new Event('change');
            themeRadio.dispatchEvent(event);
        }
        
        // 初始化语言
        const savedLanguage = getLocalStorage('language', 'zh-CN');
        const languageRadio = document.querySelector(`input[name="language"][value="${savedLanguage}"]`);
        if (languageRadio) {
            languageRadio.checked = true;
            currentLanguage = savedLanguage;
            updateLanguage();
        }
    }

    // 页面加载完成后初始化
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            // 先调用公共初始化函数
            initPage();
            // 再调用页面特定初始化函数
            init();
        });
    } else {
        // 先调用公共初始化函数
        initPage();
        // 再调用页面特定初始化函数
        init();
    }
</script>
</body>
</html>
